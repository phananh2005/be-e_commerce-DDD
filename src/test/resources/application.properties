spring.application.name=e-commerce

# H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway disabled for tests
spring.flyway.enabled=false

# Disable management port for tests
management.port=-1

# JWT configuration for tests
application.security.jwt.secret-key=test-secret-key-for-testing-purposes-only-do-not-use-in-production-12345678
application.security.jwt.expiration=3600000
application.security.jwt.refresh-expiration=86400000

# Cloudinary configuration for tests
cloudinary.cloud_name=test-cloud
cloudinary.api_key=test-key
cloudinary.api_secret=test-secret
